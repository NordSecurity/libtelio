name: GitLab CI Pipeline
on:
  pull_request_target:
    types: [labeled]
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
      - 'main-[0-9]*-[a-zA-Z0-9]*'
  merge_group:
    types: [checks_requested]
permissions: {}

jobs:
  read-triggered-ref:
    uses: ./.github/workflows/read_dotenv.yml
    with:
      key: TRIGGERED_REF

  # Branch pushes only reach GitLab (full build + natlab suite) when the branch
  # has an open PR; WIP branches without a PR shouldn't occupy the natlab runners.
  check-branch-has-pr:
    if: github.event_name == 'push' && github.ref_name != 'main' && !startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: read
    outputs:
      has_pr: ${{ steps.pr.outputs.has_pr }}
    steps:
      - id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3 4 5; do
            COUNT=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}&state=open" --jq 'length')
            echo "Attempt $attempt: open PRs for ${{ github.ref_name }}: $COUNT"
            [ "$COUNT" -gt 0 ] && break
            [ "$attempt" -lt 5 ] && sleep 5
          done
          echo "has_pr=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Open PRs for ${{ github.ref_name }}: $COUNT"

  trigger-gitlab-pipeline:
    needs: [read-triggered-ref, check-branch-has-pr]
    if: >-
      always() && needs.read-triggered-ref.result == 'success' &&
      (github.event_name != 'push' ||
       github.ref_name == 'main' ||
       startsWith(github.ref_name, 'release/') ||
       needs.check-branch-has-pr.outputs.has_pr == 'true')
    uses: NordSecurity/trigger-gitlab-pipeline/.github/workflows/trigger-gitlab-pipeline.yml@1e47022d8ab1ecb75310242902b474142f74561e
    secrets:
      ci-api-v4-url: ${{ secrets.CODEHUB_CI_API_V4_URL }}
      access-token: ${{ secrets.CODEHUB_GITLAB_API_TOKEN }}
      trigger-token: ${{ secrets.CODEHUB_TOKEN }}
      project-id: ${{ secrets.CODEHUB_PROJECT_ID }}
    with:
      cancel-outdated-pipelines: ${{ github.ref_name != 'main' }}
      triggered-ref: ${{ needs.read-triggered-ref.outputs.value }} # defined in .env file
