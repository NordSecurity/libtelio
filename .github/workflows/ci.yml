name: CI
on: [push, pull_request]
permissions: {}

jobs:
  trigger:
    if: |
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
      )
    runs-on: ubuntu-22.04
    steps:
      - name: CI Trigger
        run: echo "Triggering CI"

  uniffi-bindings:
    needs: trigger
    runs-on: ghcr.io/nordsecurity/uniffi-generators:v0.25.0-5
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
      - run uniffi-bindgen generate src/libtelio.udl --language python
      - cp src/libtelio.py ../dist/uniffi/libtelio.py
      - uses: actions/upload-artifact@0b7f8abb1508181956e8e162db84b466c27e18ce # v3.1.2
          with:
            name: libtelio.py
            path: dist/uniffi

  build:
    needs: trigger
    uses: ./.github/workflows/build.yml
  linters:
    needs: trigger
    uses: ./.github/workflows/linters.yml
  tests:
    needs: trigger
    uses: ./.github/workflows/tests.yml
  fuzzing:
    needs: trigger
    uses: ./.github/workflows/fuzzing.yml
  benchmarks:
    needs: trigger
    uses: ./.github/workflows/benchmarks.yml
  coverage:
    needs: trigger
    uses: ./.github/workflows/coverage.yml
  nagger:
    needs: trigger
    uses: ./.github/workflows/nagger.yml

  check-all-green:
    needs:
    - build
    - linters
    - tests
    - fuzzing
    - benchmarks
    - coverage
    - nagger
    runs-on: ubuntu-22.04
    steps:
    - name: Collect statuses from all jobs
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}
